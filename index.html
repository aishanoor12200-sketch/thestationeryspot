<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
content="width=device-width, 
initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ffe4ec, #ffffff);
}

.top-heading {
    text-align: center;
    font-family: 'Pacifico', cursive;
    font-size: 26px;
    color: #ff6f91;
    margin-top: 15px;
}

.top-bar {
    width: 100%;
    background: #ff8fb1;
    padding: 3px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.left-menu a {
  color: white;
  text-decoration: none  !important;
  font-family: "Times New Roman", Times, serif;
  margin-right: 15px;
  font-size: 16px;
}

.right-menu {
    display: flex;
    align-items: center;
    margin-right:40px;
}

.search {
    padding: 4px 8px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 12px;
    width: 120px;
}

.search-box {
    position: relative;
}

.search-results {
    position: absolute;
    top: 30px;
    right: 0;
    width: 220px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    display: none;
    padding: 10px;
    z-index: 1000;
}

.search-results div {
    padding: 5px;
    font-size: 12px;
    cursor: pointer;
}

.search-results div:hover {
    background: #ffe4ec;
}

.hero-outer {
    width: 80%;
    margin: 30px auto;
    padding: 10px;
    border-radius: 25px;
    background: linear-gradient(135deg, #ffd6e0, #ffffff);
}

.hero-inner {
    background: linear-gradient(135deg, #ffffff, #fbc2eb, #a6c1ee);
    border-radius: 20px;
    padding: 30px 15px;
    text-align: center;
}

.hero-inner h1 {
    font-family: 'Pacifico', cursive;
    font-size: 40px;
    color: black;
}

.hero-inner p {
    color: #666;
    font-size: 16px;
}

.btn {
    background: #ff8fb1;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 10px;
    text-decoration: none;
    display: inline-block;
}

.products {
    display: flex;
    flex-wrap: wrap;
}

.qty-box {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 5px 0;
}

.qty-box button {
  padding: 4px 10px;
  border: none;
  background: #ff8fb1;
  color: white;
  font-size: 16px;
  border-radius: 6px;
  cursor: pointer;
}

.qty-box span {
  margin: 0 10px;
  font-size: 14px;
}

.card {
    width: 150px;
    margin: 10px;
    text-align: center;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
}

.price {
    color: #ff6f91;
}

.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.popup img {
    max-width: 60%;
    max-height: 70vh;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="top-heading">The Stationery Spot</div>

<div class="top-bar">
    <div class="left-menu">
        <a href="#">Home</a>
        <a href="deals.html">Deals</a>
        <a href="contact.html">Contact</a>
        <a href="Shipping policy.html">Shipping</a>
        <a href="Refund policy.html">Refund Policy</a>
    </div>
</div>

<div class="hero-outer">
    <div class="hero-inner">
        <h1>Welcome to The Stationery Spot</h1>
        <p>Your go-to place for cute & aesthetic stationery 💗</p>
    </div>
</div>

<!-- SAMPLE PRODUCT -->
<div class="card">
<img src="diary1.jpg.jpeg">
<p class="name">Cute Floral Diary</p>
<p class="price">Rs.450</p>

<div class="qty-box">
<button onclick="decrease(this)">-</button>
<span class="qty">1</span>
<button onclick="increase(this)">+</button>
</div>

<button class="btn" onclick="addToCart(this,'DR01')">Add to Cart</button>
</div>

<!-- WhatsApp -->
<button class="btn" onclick="sendWhatsAppOrder()">Order on WhatsApp</button>

<script>

let cart = [];

/* ADD TO CART FIX */
function addToCart(btn, code) {
    let card = btn.parentElement;
    let name = card.querySelector(".name").innerText;
    let qty = card.querySelector(".qty").innerText;

    cart.push({
        name: name,
        qty: qty,
        code: code
    });

    alert("Added to cart: " + name);
}

/* WHATSAPP ORDER FIX */
function sendWhatsAppOrder() {

    if(cart.length === 0){
        alert("Cart is empty!");
        return;
    }

    let message = "🛒 Order Details:\n\n";

    cart.forEach(item => {
        message += item.name + " (" + item.code + ") x " + item.qty + "\n";
    });

    let url = "https://wa.me/923271576380?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
}

/* QUANTITY */
function increase(btn) {
  let qty = btn.parentElement.querySelector(".qty");
  qty.innerText = parseInt(qty.innerText) + 1;
}

function decrease(btn) {
  let qty = btn.parentElement.querySelector(".qty");
  let value = parseInt(qty.innerText);
  if (value > 1) {
    qty.innerText = value - 1;
  }
}

</script>

</body>
</html>
