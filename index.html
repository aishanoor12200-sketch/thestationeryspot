<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Stationery Spot</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: white;
    text-align: center;
}

/* TITLE */
.title {
    font-family: 'Pacifico', cursive;
    font-size: 50px;
    color: #ff9ecb;
    margin-top: 30px;
}

/* CATEGORY HEADING */
.category {
    font-size: 26px;
    margin: 30px 0 10px;
    border-bottom: 2px solid black;
    display: inline-block;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 15px;
    padding: 15px;
}

/* CARD */
.card {
    background: #f8f8f8;
    border-radius: 10px;
    overflow: hidden;
    padding-bottom: 10px;
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.name {
    font-size: 14px;
    padding: 5px;
}

.price {
    font-weight: bold;
}

.btn {
    background: black;
    color: white;
    padding: 5px 10px;
    border-radius: 15px;
    text-decoration: none;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="title">The Stationery Spot</div>

<!-- 🌸 DIARIES -->
<div class="category">🌸 Diaries</div>

<div class="grid">
    <div class="card">
        <img src="diary1.jpg">
        <div class="name">Cute Floral Diary</div>
        <div class="price">Rs.500</div>
        <a class="btn" href="https://wa.me/923271576380?text=I want Floral Diary">Order</a>
    </div>

    <div class="card">
        <img src="diary2.jpg">
        <div class="name">Pink Aesthetic Diary</div>
        <div class="price">Rs.600</div>
        <a class="btn" href="https://wa.me/923271576380?text=I want Pink Diary">Order</a>
    </div>
</div>

<!-- ✏️ PENS -->
<div class="category">✏️ Pens</div>

<div class="grid">
    <div class="card">
        <img src="pen1.jpg">
        <div class="name">Gel Pens Set</div>
        <div class="price">Rs.300</div>
        <a class="btn" href="https://wa.me/923271576380?text=I want Gel Pens">Order</a>
    </div>

    <div class="card">
        <img src="pen2.jpg">
        <div class="name">Pastel Pens</div>
        <div class="price">Rs.350</div>
        <a class="btn" href="https://wa.me/923271576380?text=I want Pastel Pens">Order</a>
    </div>
</div>

<!-- 🎀 OTHER ITEMS -->
<div class="category">🎀 Accessories</div>

<div class="grid">
    <div class="card">
        <img src="item1.jpg">
        <div class="name">Sticker Pack</div>
        <div class="price">Rs.200</div>
        <a class="btn" href="https://wa.me/923271576380?text=I want Stickers">Order</a>
    </div>

    <div class="card">
        <img src="item2.jpg">
        <div class="name">Keychain</div>
        <div class="price">Rs.250</div>
        <a class="btn" href="https://wa.me/923271576380?text=I want Keychain">Order</a>
    </div>
</div>

</body>
</html>
