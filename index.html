<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Stationery Spot</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    background-color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

/* Container */
.container {
    padding: 20px;
}

/* Welcome Text */
.welcome {
    font-family: 'Poppins', sans-serif;
    font-size: 30px;
    letter-spacing: 6px;
    color: black;
    margin-bottom: 20px;
}

/* Main Title */
.title {
    font-family: 'Pacifico', cursive;
    font-size: 50px;
    color: #ff9ecb;
    text-shadow: 
        0 0 10px #ffd6e8,
        0 0 20px #ffc0db,
        2px 2px 0px #ff7fb0;
}

/* Decorative line */
.line {
    margin-top: 30px;
    height: 3px;
    width: 60%;
    background: black;
    margin-left: auto;
    margin-right: auto;
}
</style>

</head>

<body>

<div class="container">
    <div class="welcome">WELCOME TO</div>
    <div class="title">The Stationery Spot</div>
    <div class="line"></div>
</div>

</body>
</html>
