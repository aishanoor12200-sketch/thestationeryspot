<!DOCTYPE html>
<html>
<head>
    <title>The Stationery Spot</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #fff;
            text-align: center;
        }

        /* LOGO */
        .logo img {
            width: 120px;
            margin-top: 20px;
        }

        /* TITLE */
        .title {
            font-size: 40px;
            color: #ff7aa2;
            font-family: cursive;
            margin: 10px 0;
        }

        /* CATEGORY */
        .category {
            margin-top: 40px;
        }

        .category h2 {
            border-bottom: 2px solid black;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* PRODUCTS GRID */
        .products {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px;
        }

        .card {
            width: 250px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 10px;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .price {
            font-weight: bold;
            margin: 5px 0;
        }

        .btn {
            background: black;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

    </style>
</head>

<body>

    <!-- LOGO -->
    <div class="logo">
        <img src="logo.jpeg">
    </div>

    <!-- TITLE -->
    <div class="title">
        The Stationery Spot
    </div>

    <!-- DIARIES -->
    <div class="category">
        <h2>🌸 Diaries</h2>

        <div class="products">

            <div class="card">
                <img src="diary1.jpg.jpeg">
                <p>Cute Floral Diary</p>
                <p class="price">Rs.500</p>
                <button class="btn">Order</button>
            </div>

            <div class="card">
                <img src="diary2.jpg.jpeg">
                <p>Pink Aesthetic Diary</p>
                <p class="price">Rs.600</p>
                <button class="btn">Order</button>
            </div>

        </div>
    </div>

    <!-- PENS -->
    <div class="category">
        <h2>✏️ Pens</h2>

        <div class="products">

            <div class="card">
                <img src="diary1.jpg.jpeg">
                <p>Gel Pen Set</p>
                <p class="price">Rs.300</p>
                <button class="btn">Order</button>
            </div>

            <div class="card">
                <img src="diary2.jpg.jpeg">
                <p>Colorful Pens</p>
                <p class="price">Rs.400</p>
                <button class="btn">Order</button>
            </div>

        </div>
    </div>

</body>
</html>
