<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ffe4ec, #ffffff);
}

/* TOP */
.top-heading {
    text-align: center;
    font-family: 'Pacifico', cursive;
    font-size: 26px;
    color: #ff6f91;
    margin-top: 15px;
}

.top-bar {
    width: 100%;
    background: #ff8fb1;
    padding: 3px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.left-menu a {
  color: white;
  text-decoration: none;
  font-family: "Times New Roman";
  margin-right: 15px;
  font-size: 16px;
}

.right-menu {
    display: flex;
    align-items: center;
    margin-right:40px;
}

/* SEARCH */
.search {
    padding: 4px 8px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 12px;
    width: 120px;
}

.search-box {
    position: relative;
}

.search-results {
    position: absolute;
    top: 30px;
    right: 0;
    width: 220px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    display: none;
    padding: 10px;
    z-index: 1000;
}

.search-results div {
    padding: 5px;
    font-size: 12px;
    cursor: pointer;
}

.hero-outer {
    width: 80%;
    margin: 30px auto;
    padding: 10px;
    border-radius: 25px;
    background: linear-gradient(135deg, #ffd6e0, #ffffff);
}

.hero-inner {
    text-align: center;
    padding: 30px 15px;
}

.hero-inner h1 {
    font-family: 'Pacifico', cursive;
    font-size: 40px;
}

/* PRODUCTS */
.category {
    padding: 15px;
}

.products {
    display: flex;
    flex-wrap: wrap;
}

.card {
    width: 150px;
    margin: 10px;
    text-align: center;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
}

.price {
    color: #ff6f91;
}

.qty-box {
  display: flex;
  justify-content: center;
  align-items: center;
}

.qty-box button {
  background: #ff8fb1;
  border: none;
  color: white;
  padding: 4px 10px;
}

/* ADD BUTTON FIX */
.add-btn {
  width: 100%;
  padding: 8px;
  border: none;
  background: black;
  color: white;
  border-radius: 8px;
  margin-top: 8px;
}

/* ORDER BUTTON */
.order-inline {
    margin-top: 5px;
}

.order-btn {
    background: white;
    border: 2px solid #ff8fb1;
    padding: 6px 10px;
    border-radius: 10px;
    cursor: pointer;
}

/* FLOATING */
.floating-order {
    position: fixed;
    right: 15px;
    bottom: 70px;
    display: none;
    z-index: 9999;
}

.floating-order .btn {
    background: #ff8fb1;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 20px;
}

/* POPUP */
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.popup img {
    max-width: 70%;
}

</style>

</head>

<body>

<div class="top-heading">The Stationery Spot</div>

<div class="top-bar">
    <div class="left-menu">
        <a href="#">Home</a>
        <a href="deals.html">Deals</a>
        <a href="contact.html">Contact</a>
    </div>

    <div class="right-menu">
        <input type="text" id="searchInput" class="search" placeholder="Search..." onkeyup="searchItems()">
    </div>
</div>

<!-- HERO -->
<div class="hero-outer">
<div class="hero-inner">
<h1>Welcome</h1>
</div>
</div>

<!-- PRODUCTS -->
<div class="category">
<h2>Diaries</h2>

<div class="products">

<!-- CARD 1 -->
<div class="card">
    <img src="diary1.jpg.jpeg" onclick="openImage(this.src)">
    <p class="name">Floral Diary</p>
    <p class="price">Rs.450</p>

    <div class="qty-box">
        <button onclick="decrease(this)">-</button>
        <span class="qty">1</span>
        <button onclick="increase(this)">+</button>
    </div>

    <button class="add-btn" onclick="addToCart(this,'DR01')">Add to Cart</button>

    <div class="order-inline">
        <button class="order-btn" onclick="sendWhatsAppOrder()">Place Order</button>
    </div>
</div>

</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup" onclick="closeImage()">
    <img id="popupImg">
</div>

<!-- FLOATING BUTTON -->
<div class="floating-order" id="floatingBtn">
    <button class="btn" onclick="sendWhatsAppOrder()">🛒 Done Your Order</button>
</div>

<script>

let cart = [];

function addToCart(btn, code) {

    let card = btn.closest(".card");

    let name = card.querySelector(".name").innerText;
    let price = parseInt(card.querySelector(".price").innerText.replace(/[^0-9]/g,''));
    let qty = parseInt(card.querySelector(".qty").innerText);

    cart.push({ name, code, qty, total: price * qty });

    document.getElementById("floatingBtn").style.display = "block";

    alert("Added: " + name);
}

function sendWhatsAppOrder() {

    if(cart.length === 0){
        alert("Cart empty!");
        return;
    }

    let msg = "🛒 ORDER:\n\n";
    let total = 0;

    cart.forEach(i=>{
        msg += i.name+" x "+i.qty+" = Rs."+i.total+"\n";
        total += i.total;
    });

    msg += "\nTOTAL: Rs."+total;

    window.open("https://wa.me/923271576380?text="+encodeURIComponent(msg));
}

function increase(btn){
  btn.parentElement.querySelector(".qty").innerText++;
}

function decrease(btn){
  let q = btn.parentElement.querySelector(".qty");
  if(q.innerText > 1) q.innerText--;
}

function openImage(src){
  document.getElementById("popup").style.display="flex";
  document.getElementById("popupImg").src = src;
}

function closeImage(){
  document.getElementById("popup").style.display="none";
}

function searchItems(){}

</script>

</body>
</html>
