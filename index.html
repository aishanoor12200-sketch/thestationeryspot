<!DOCTYPE html>
<html>
<head>
    <title>The Stationery Spot</title>

    <!-- Google Font for cute text -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            background-color: white;
        }

        /* Top small text */
        .top-text {
            font-size: 16px;
            margin-top: 15px;
            color: black;
        }

        /* Logo */
        .logo img {
            width: 120px;
            margin: 15px 0;
        }

        /* Welcome text */
        .welcome {
            font-size: 30px;
            font-family: 'Times New Roman', serif;
            color: black;
            margin: 10px 0;
        }

        /* Cute pink heading */
        .main-title {
            font-family: 'Pacifico', cursive;
            font-size: 40px;
            color: #ff7aa2;
            text-shadow: 0 0 10px #ffc0cb;
            margin-bottom: 20px;
        }

        /* Category */
        .category {
            margin-top: 40px;
        }

        .category h2 {
            border-bottom: 2px solid black;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Products */
        .products {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px;
        }

        .card {
            width: 250px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 10px;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .price {
            font-weight: bold;
        }

        .btn {
            background: black;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        .popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.popup img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

    </style>
</head>

<body>

    <!-- Small top text -->
    <div class="top-text">
        The Stationery Spot
    </div>

    <!-- Logo -->
    <div class="logo">
        <img src="logo.jpeg">
    </div>

    <!-- Welcome -->
    <div class="welcome">
        Welcome to
    </div>

    <!-- Cute Title -->
    <div class="main-title">
        The Stationery Spot
    </div>

    <!-- Diaries -->
    <div class="category">
        <h2>🌸 Diaries</h2>

        <div class="products">

            <div class="card">
                <img src="diary1.jpg.jpeg" onclick="openImage(this.src)">
                <p>Cute Floral Diary</p>
                <p class="price">Rs.450</p>
                <button class="btn">Order</button>
            </div>

            <div class="card">
                <img src="diary2.jpg.jpeg" onclick="openImage(this.src)">
                <p>Pink Aesthetic Diary</p>
                <p class="price">Rs.450</p>
                <button class="btn">Order</button>
            </div> <!-- products close -->
</div> <!-- category close -->

<!-- Glass Sipper -->
<div class="category">
  <h2>🌸 Glass Sipper</h2>

  <div class="products">

    <div class="card">
      <img src="1776362161509.png"
     onclick="openImage(this.src)">
      <p>Cute Glass Sipper</p>
      <p class="price">Rs.650</p>
      <button class="btn">Order</button>
    </div>

    <div class="card">
      <img src="diary1.jpg.jpeg" onclick="openImage(this.src)">
      <p>Aesthetic Sipper</p>
      <p class="price">Rs.900</p>
      <button class="btn">Order</button>
         </div> <!-- products close -->
</div> <!-- category close -->

<!-- Erassor -->
<div class="category">
  <h2>🌸 Erassor</h2>

  <div class="products">

    <div class="card">
      <img src="1776512603250.png"
    onclick="openImage(this.src)">
      <p>Cute erassors</p>
      <p class="price">Rs.200</p>
      <button class="btn">Order</button>
    </div>
    </div>

  </div>
</div>
        

    </div>
</div>

        </div>
    </div>
<!-- Image Popup -->
<div id="imagePopup" class="popup" onclick="closeImage()">
  <img id="popupImg">
</div>

<script>
function openImage(src) {
  document.getElementById("imagePopup").style.display = "flex";
  document.getElementById("popupImg").src = src;
}

function closeImage() {
  document.getElementById("imagePopup").style.display = "none";
}
</script>
</body>
</html>
