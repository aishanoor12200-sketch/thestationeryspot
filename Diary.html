<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Diaries | The Stationery Spot</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Pacifico&display=swap" rel="stylesheet">
</head>

<body>

  <!-- ================= TOP BAR ================= -->

  <div class="top-bar">

    <div class="logo-area">
      <img src="logo.png" class="pc-logo">

      <h1 class="top-heading">
        The Stationery Spot
      </h1>
    </div>

    <div class="left-menu">
      <a href="index.html">Home</a>
      <a href="diary.html">Diaries</a>
      <a href="jewelry.html">Jewelry</a>
    </div>

    <div class="right-menu">
      <input type="text" class="search" placeholder="Search...">
    </div>

  </div>

  <!-- ================= HERO SECTION ================= -->

  <div class="hero-box">

    <img src="diary-banner.jpg" class="main-img">

  </div>

  <!-- ================= DIARY PRODUCTS ================= -->

  <section class="category">

    <h2>Diary Collection</h2>

    <div class="products">

      <!-- CARD 1 -->

      <div class="card">

        <div class="img-box">
          <img src="images/diary1.jpg">
        </div>

        <h3 class="name">
          Pink Diary
        </h3>

        <p class="price">
          Rs.850
        </p>

        <button class="add-btn">
          Add to Cart
        </button>

      </div>

      <!-- CARD 2 -->

      <div class="card">

        <div class="img-box">
          <img src="images/diary2.jpg">
        </div>

        <h3 class="name">
          Teddy Diary
        </h3>

        <p class="price">
          Rs.950
        </p>

        <button class="add-btn">
          Add to Cart
        </button>

      </div>

    </div>

  </section>

</body>
